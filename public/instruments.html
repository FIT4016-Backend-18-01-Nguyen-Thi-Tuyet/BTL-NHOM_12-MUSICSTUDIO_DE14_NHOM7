<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhạc cụ — Music Studio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="shared.js"></script>
<style id="dynamicStyle"></style>
</head>
<body>
<div id="sidebarContainer"></div>
<div class="main-content">
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner-ring"></div></div>

  <div class="page-header">
    <div class="page-title">🎸 Quản lý Nhạc cụ</div>
    <button class="btn-primary-custom" onclick="openAddModal()">
      <i class="bi bi-plus-lg"></i> Thêm nhạc cụ
    </button>
  </div>

  <!-- Filter -->
  <div class="data-table mb-3">
    <div class="p-3 d-flex gap-2 flex-wrap align-items-center">
      <input type="text" class="form-control" id="searchInput" placeholder="🔍 Tìm kiếm nhạc cụ..." style="max-width:250px" oninput="filterTable()">
      <select class="form-select" id="statusFilter" style="max-width:180px" onchange="filterTable()">
        <option value="">Tất cả trạng thái</option>
        <option value="available">Sẵn sàng</option>
        <option value="borrowed">Đang mượn</option>
        <option value="maintenance">Bảo trì</option>
      </select>
    </div>
  </div>

  <div class="data-table">
    <div class="table-header">
      <div class="table-title">Danh sách nhạc cụ</div>
      <span id="totalCount" style="color:var(--text-muted);font-size:0.8rem"></span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tên nhạc cụ</th>
            <th>Loại</th>
            <th>Thương hiệu</th>
            <th>Serial</th>
            <th>Giá thuê/giờ</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="instrumentsTable">
          <tr><td colspan="8" class="empty-state"><i class="bi bi-hourglass"></i>Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Add/Edit -->
<div class="modal fade" id="instrumentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Thêm nhạc cụ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label">Tên nhạc cụ *</label>
          <input type="text" class="form-control" id="fName" placeholder="VD: Guitar Acoustic Yamaha">
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Loại nhạc cụ</label>
            <input type="text" class="form-control" id="fCategory" placeholder="Guitar, Piano, Drum...">
          </div>
          <div class="col-6">
            <label class="form-label">Thương hiệu</label>
            <input type="text" class="form-control" id="fBrand" placeholder="Yamaha, Roland...">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Số Serial</label>
          <input type="text" class="form-control" id="fSerial" placeholder="SN-001">
        </div>
        <div class="mb-3">
          <label class="form-label">Giá thuê (VNĐ/giờ) *</label>
          <input type="number" class="form-control" id="fPrice" placeholder="50000">
        </div>
        <div class="mb-3" id="statusField" style="display:none">
          <label class="form-label">Trạng thái</label>
          <select class="form-select" id="fStatus">
            <option value="available">Sẵn sàng</option>
            <option value="maintenance">Bảo trì</option>
            <option value="retired">Nghỉ hưu</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" id="fDesc" rows="2" placeholder="Mô tả nhạc cụ..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-primary-custom" style="background:var(--surface2);border:1px solid var(--border);color:var(--text)" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn-primary-custom" onclick="saveInstrument()">
          <i class="bi bi-check-lg"></i> Lưu
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
requireAuth();
document.getElementById('dynamicStyle').textContent = SIDEBAR_CSS;
document.getElementById('sidebarContainer').innerHTML = renderSidebar('instruments');

let allData = [];
const modal = new bootstrap.Modal(document.getElementById('instrumentModal'));
const user = getUser();

async function loadData() {
  showLoading(true);
  const { data } = await apiFetch('/instruments');
  allData = Array.isArray(data) ? data : [];
  renderTable(allData);
  showLoading(false);
}

function renderTable(data) {
  document.getElementById('totalCount').textContent = `${data.length} nhạc cụ`;
  if (!data.length) {
    document.getElementById('instrumentsTable').innerHTML = `<tr><td colspan="8" class="empty-state"><i class="bi bi-music-note-beamed"></i>Chưa có nhạc cụ nào</td></tr>`;
    return;
  }
  document.getElementById('instrumentsTable').innerHTML = data.map((i, idx) => `
    <tr>
      <td style="color:var(--text-muted)">${idx+1}</td>
      <td><strong>${i.name}</strong></td>
      <td>${i.category || '—'}</td>
      <td>${i.brand || '—'}</td>
      <td style="font-size:0.8rem;color:var(--text-muted)">${i.serial_no || '—'}</td>
      <td style="color:var(--primary)">${formatCurrency(i.rental_price)}</td>
      <td>${badgeStatus(i.status)}</td>
      <td>
        <div class="d-flex gap-1">
          ${['admin','staff'].includes(user.role) ? `
            <button class="btn-sm-action" onclick="openEditModal(${JSON.stringify(i).replace(/"/g,'&quot;')})"><i class="bi bi-pencil"></i></button>
            <button class="btn-sm-action danger" onclick="deleteItem(${i.id})"><i class="bi bi-trash"></i></button>
          ` : '—'}
        </div>
      </td>
    </tr>`).join('');
}

function filterTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const filtered = allData.filter(i =>
    (!search || i.name.toLowerCase().includes(search) || (i.category||'').toLowerCase().includes(search) || (i.brand||'').toLowerCase().includes(search)) &&
    (!status || i.status === status)
  );
  renderTable(filtered);
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Thêm nhạc cụ';
  document.getElementById('editId').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fBrand').value = '';
  document.getElementById('fSerial').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('statusField').style.display = 'none';
  modal.show();
}

function openEditModal(item) {
  document.getElementById('modalTitle').textContent = 'Sửa nhạc cụ';
  document.getElementById('editId').value = item.id;
  document.getElementById('fName').value = item.name;
  document.getElementById('fCategory').value = item.category || '';
  document.getElementById('fBrand').value = item.brand || '';
  document.getElementById('fSerial').value = item.serial_no || '';
  document.getElementById('fPrice').value = item.rental_price;
  document.getElementById('fDesc').value = item.description || '';
  document.getElementById('fStatus').value = item.status;
  document.getElementById('statusField').style.display = 'block';
  modal.show();
}

async function saveInstrument() {
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('fName').value.trim(),
    category: document.getElementById('fCategory').value.trim(),
    brand: document.getElementById('fBrand').value.trim(),
    serial_no: document.getElementById('fSerial').value.trim(),
    rental_price: document.getElementById('fPrice').value,
    description: document.getElementById('fDesc').value.trim(),
    status: document.getElementById('fStatus').value,
  };
  if (!body.name || !body.rental_price) return showToast('Vui lòng điền tên và giá thuê!', 'error');

  const { ok, data } = id
    ? await apiFetch(`/instruments/${id}`, { method: 'PUT', body: JSON.stringify(body) })
    : await apiFetch('/instruments', { method: 'POST', body: JSON.stringify(body) });

  if (ok) {
    showToast(id ? 'Cập nhật thành công!' : 'Thêm nhạc cụ thành công!');
    modal.hide();
    loadData();
  } else {
    showToast(data.message || 'Có lỗi xảy ra!', 'error');
  }
}

async function deleteItem(id) {
  if (!confirm('Xác nhận xóa nhạc cụ này?')) return;
  const { ok, data } = await apiFetch(`/instruments/${id}`, { method: 'DELETE' });
  if (ok) { showToast('Xóa thành công!'); loadData(); }
  else showToast(data.message || 'Lỗi!', 'error');
}

loadData();
</script>
</body>
</html>
