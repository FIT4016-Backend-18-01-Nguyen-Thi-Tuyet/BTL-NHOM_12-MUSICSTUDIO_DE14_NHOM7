<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt phòng — Music Studio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="shared.js"></script>
<style id="dynamicStyle"></style>
</head>
<body>
<div id="sidebarContainer"></div>
<div class="main-content">
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner-ring"></div></div>
  <div class="page-header">
    <div class="page-title">📅 Đặt phòng</div>
    <button class="btn-primary-custom" onclick="openBookModal()"><i class="bi bi-plus-lg"></i> Đặt phòng mới</button>
  </div>

  <div class="data-table">
    <div class="table-header">
      <div class="table-title">Lịch đặt phòng</div>
      <select class="form-select" id="statusFilter" style="max-width:180px" onchange="loadData()">
        <option value="">Tất cả</option>
        <option value="pending">Chờ xác nhận</option>
        <option value="confirmed">Đã xác nhận</option>
        <option value="completed">Hoàn thành</option>
        <option value="cancelled">Đã hủy</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>#</th><th>Phòng</th><th>Khách hàng</th><th>Bắt đầu</th><th>Kết thúc</th><th>Giờ</th><th>Tiền</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="bookingsTable"><tr><td colspan="9" class="empty-state"><i class="bi bi-hourglass"></i>Đang tải...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Book Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Đặt phòng mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Chọn phòng *</label>
          <select class="form-select" id="bRoom"></select>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Thời gian bắt đầu *</label>
            <input type="datetime-local" class="form-control" id="bStart">
          </div>
          <div class="col-6">
            <label class="form-label">Thời gian kết thúc *</label>
            <input type="datetime-local" class="form-control" id="bEnd">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Ghi chú</label>
          <textarea class="form-control" id="bNotes" rows="2"></textarea>
        </div>
        <div id="pricePreview" style="display:none;background:rgba(255,107,43,0.1);border:1px solid rgba(255,107,43,0.3);border-radius:8px;padding:0.75rem;font-size:0.9rem;color:var(--primary)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary-custom" style="background:var(--surface2);border:1px solid var(--border);color:var(--text)" data-bs-dismiss="modal">Hủy</button>
        <button class="btn-primary-custom" onclick="saveBooking()"><i class="bi bi-calendar-check"></i> Đặt phòng</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
requireAuth();
document.getElementById('dynamicStyle').textContent = SIDEBAR_CSS;
document.getElementById('sidebarContainer').innerHTML = renderSidebar('bookings');
const modal = new bootstrap.Modal(document.getElementById('bookModal'));
const user = getUser();
let rooms = [];

async function loadData() {
  showLoading(true);
  const endpoint = user.role === 'customer' ? '/bookings/my' : '/bookings';
  const { data } = await apiFetch(endpoint);
  const list = Array.isArray(data) ? data : [];
  const status = document.getElementById('statusFilter').value;
  const filtered = status ? list.filter(b => b.status === status) : list;

  if (!filtered.length) {
    document.getElementById('bookingsTable').innerHTML = `<tr><td colspan="9" class="empty-state"><i class="bi bi-calendar3"></i>Chưa có đặt phòng nào</td></tr>`;
  } else {
    document.getElementById('bookingsTable').innerHTML = filtered.map((b,i) => `
      <tr>
        <td style="color:var(--text-muted)">${i+1}</td>
        <td><strong>${b.room_name||'—'}</strong></td>
        <td>${b.customer_name||'—'}<br><small style="color:var(--text-muted)">${b.customer_phone||''}</small></td>
        <td style="font-size:0.8rem">${formatDate(b.start_time)}</td>
        <td style="font-size:0.8rem">${formatDate(b.end_time)}</td>
        <td>${b.duration_hours||'—'}h</td>
        <td style="color:var(--primary)">${formatCurrency(b.total_price)}</td>
        <td>${badgeStatus(b.status)}</td>
        <td>
          ${b.status==='pending'&&(user.role==='admin'||user.role==='staff') ? `<button class="btn-sm-action" onclick="updateStatus(${b.booking_id},'confirmed')" title="Xác nhận"><i class="bi bi-check-lg"></i></button>` : ''}
          ${b.status!=='cancelled'&&b.status!=='completed' ? `<button class="btn-sm-action danger" onclick="cancelBooking(${b.booking_id})" title="Hủy"><i class="bi bi-x-lg"></i></button>` : ''}
        </td>
      </tr>`).join('');
  }
  showLoading(false);
}

async function openBookModal() {
  const { data } = await apiFetch('/rooms');
  rooms = Array.isArray(data) ? data.filter(r => r.status === 'available') : [];
  document.getElementById('bRoom').innerHTML = rooms.map(r => `<option value="${r.id}" data-rate="${r.hourly_rate}">${r.name} — ${formatCurrency(r.hourly_rate)}/giờ</option>`).join('');
  document.getElementById('bStart').value = '';
  document.getElementById('bEnd').value = '';
  document.getElementById('bNotes').value = '';
  document.getElementById('pricePreview').style.display = 'none';
  modal.show();
}

// Preview price
['bStart','bEnd','bRoom'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', previewPrice);
});

function previewPrice() {
  const start = document.getElementById('bStart').value;
  const end   = document.getElementById('bEnd').value;
  const sel   = document.getElementById('bRoom');
  const rate  = parseFloat(sel.options[sel.selectedIndex]?.dataset.rate || 0);
  if (start && end && rate) {
    const hours = (new Date(end) - new Date(start)) / 3600000;
    if (hours > 0) {
      const total = hours * rate;
      document.getElementById('pricePreview').style.display = 'block';
      document.getElementById('pricePreview').innerHTML = `💰 Dự tính: ${hours.toFixed(1)} giờ × ${formatCurrency(rate)} = <strong>${formatCurrency(total)}</strong>`;
    }
  }
}

async function saveBooking() {
  const room_id    = document.getElementById('bRoom').value;
  const start_time = document.getElementById('bStart').value;
  const end_time   = document.getElementById('bEnd').value;
  const notes      = document.getElementById('bNotes').value;
  if (!room_id || !start_time || !end_time) return showToast('Vui lòng điền đầy đủ!', 'error');
  if (new Date(end_time) <= new Date(start_time)) return showToast('Thời gian kết thúc phải sau bắt đầu!', 'error');

  const { ok, data } = await apiFetch('/bookings', { method:'POST', body: JSON.stringify({ room_id, start_time, end_time, notes }) });
  if (ok) { showToast(`✅ Đặt phòng thành công! ${data.total_price ? 'Tổng tiền: '+formatCurrency(data.total_price) : ''}`); modal.hide(); loadData(); }
  else showToast(data.message || 'Lỗi!', 'error');
}

async function updateStatus(id, status) {
  const { ok } = await apiFetch(`/bookings/${id}/status`, { method:'PATCH', body: JSON.stringify({ status }) });
  if (ok) { showToast('Cập nhật thành công!'); loadData(); }
}

async function cancelBooking(id) {
  if (!confirm('Hủy đặt phòng này?')) return;
  const { ok, data } = await apiFetch(`/bookings/${id}/cancel`, { method:'PATCH' });
  if (ok) { showToast('Đã hủy đặt phòng!'); loadData(); }
  else showToast(data.message || 'Lỗi!', 'error');
}

loadData();
</script>
</body>
</html>
