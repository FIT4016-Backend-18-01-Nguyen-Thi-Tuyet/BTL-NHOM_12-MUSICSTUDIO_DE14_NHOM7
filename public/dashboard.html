<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Music Studio Manager</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <script src="shared.js"></script>

    <style id="dynamicStyle"></style>
</head>

<body>

    <div id="sidebarContainer"></div>

    <div class="main-content">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner-ring"></div>
        </div>

        <div class="page-header">
            <div>
                <div class="page-title">Dashboard</div>
                <div id="welcomeMsg" style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem"></div>
            </div>
            <div id="currentTime" style="color:var(--text-muted);font-size:0.85rem"></div>
        </div>

        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-md-4 col-lg-2">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
                    <div class="stat-value" id="statUsers">—</div>
                    <div class="stat-label">Người dùng</div>
                </div>
            </div>

            <div class="col-md-4 col-lg-2">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-music-note-beamed"></i></div>
                    <div class="stat-value" id="statInstruments">—</div>
                    <div class="stat-label">Nhạc cụ</div>
                </div>
            </div>

            <div class="col-md-4 col-lg-2">
                <div class="stat-card">
                    <div class="stat-icon"><i class="bi bi-door-open-fill"></i></div>
                    <div class="stat-value" id="statRooms">—</div>
                    <div class="stat-label">Phòng</div>
                </div>
            </div>
        </div>
    </div>

    <script>
/* 🔥 FIX 1: CHỜ LOAD XONG MỚI CHECK AUTH */
window.onload = () => {

  const token = localStorage.getItem("token");

  console.log("TOKEN:", token); // debug

  /* 🔥 FIX 2: CHECK TOKEN CHUẨN */
  if (!token || token === "undefined" || token === "null") {
    localStorage.clear();
    window.location.href = "login.html";
    return;
  }

  /* 🔥 LOAD UI SAU KHI PASS AUTH */
  document.getElementById('dynamicStyle').textContent = SIDEBAR_CSS;
  document.getElementById('sidebarContainer').innerHTML = renderSidebar('dashboard');

  const user = getUser();
  document.getElementById('welcomeMsg').textContent =
    `Xin chào, ${user.full_name || user.username}!`;

  /* CLOCK */
  setInterval(() => {
    document.getElementById('currentTime').textContent =
      new Date().toLocaleString('vi-VN');
  }, 1000);

  loadDashboard();
};


/* 🔥 API LOAD */
async function loadDashboard() {
  showLoading(true);

  try {
    const { data } = await apiFetch('/reports/dashboard');

    document.getElementById('statUsers').textContent       = data.total_users || 0;
    document.getElementById('statInstruments').textContent = data.available_instruments || 0;
    document.getElementById('statRooms').textContent       = data.available_rooms || 0;

  } catch (e) {
    console.error("API ERROR:", e);
  }

  showLoading(false);
}
    </script>

</body>
</html>
