<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mượn/Trả — Music Studio Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<script src="shared.js"></script>
<style id="dynamicStyle"></style>
</head>
<body>
<div id="sidebarContainer"></div>
<div class="main-content">
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner-ring"></div></div>
  <div class="page-header">
    <div class="page-title">🎵 Mượn / Trả nhạc cụ</div>
    <div class="d-flex gap-2">
      <button class="btn-primary-custom" onclick="openBorrowModal()"><i class="bi bi-arrow-up-circle"></i> Cho mượn</button>
      <button class="btn-primary-custom" onclick="openReturnModal()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text)"><i class="bi bi-arrow-down-circle"></i> Nhận trả</button>
    </div>
  </div>

  <div class="data-table">
    <div class="table-header">
      <div class="table-title">Lịch sử mượn trả</div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>#</th><th>Nhạc cụ</th><th>Người mượn</th><th>Nhân viên</th><th>Ngày mượn</th><th>Hạn trả</th><th>Ngày trả</th><th>Tiền</th><th>Tình trạng trước/sau</th><th>Trạng thái</th></tr></thead>
        <tbody id="borrowsTable"><tr><td colspan="10" class="empty-state"><i class="bi bi-hourglass"></i>Đang tải...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Borrow Modal -->
<div class="modal fade" id="borrowModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Cho mượn nhạc cụ</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">Nhạc cụ *</label>
            <select class="form-select" id="bInstrument"></select>
          </div>
          <div class="col-6">
            <label class="form-label">Khách hàng (User ID) *</label>
            <input type="number" class="form-control" id="bUserId" placeholder="ID người mượn">
          </div>
          <div class="col-6">
            <label class="form-label">Hạn trả *</label>
            <input type="datetime-local" class="form-control" id="bExpected">
          </div>
          <div class="col-6">
            <label class="form-label">Tiền đặt cọc</label>
            <input type="number" class="form-control" id="bDeposit" placeholder="200000">
          </div>
          <div class="col-6">
            <label class="form-label">Tình trạng nhạc cụ *</label>
            <select class="form-select" id="bCondition">
              <option value="excellent">Xuất sắc</option>
              <option value="good" selected>Tốt</option>
              <option value="fair">Bình thường</option>
              <option value="damaged">Hỏng nhẹ</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Ghi chú tình trạng</label>
            <input type="text" class="form-control" id="bCondNotes" placeholder="Ghi chú...">
          </div>
          <div class="col-12">
            <label class="form-label">Ghi chú</label>
            <textarea class="form-control" id="bNotes" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary-custom" style="background:var(--surface2);border:1px solid var(--border);color:var(--text)" data-bs-dismiss="modal">Hủy</button>
        <button class="btn-primary-custom" onclick="saveBorrow()"><i class="bi bi-check-lg"></i> Xác nhận mượn</button>
      </div>
    </div>
  </div>
</div>

<!-- Return Modal -->
<div class="modal fade" id="returnModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Nhận trả nhạc cụ</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Chọn giao dịch mượn *</label>
          <select class="form-select" id="rBorrowId"></select>
        </div>
        <div class="mb-3">
          <label class="form-label">Tình trạng sau khi trả *</label>
          <select class="form-select" id="rCondition">
            <option value="excellent">Xuất sắc</option>
            <option value="good" selected>Tốt</option>
            <option value="fair">Bình thường</option>
            <option value="damaged">Hỏng</option>
            <option value="broken">Vỡ/Hỏng nặng</option>
          </select>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Phí hỏng hóc</label>
            <input type="number" class="form-control" id="rDamageFee" placeholder="0" value="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Ghi chú</label>
          <textarea class="form-control" id="rNotes" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary-custom" style="background:var(--surface2);border:1px solid var(--border);color:var(--text)" data-bs-dismiss="modal">Hủy</button>
        <button class="btn-primary-custom" onclick="saveReturn()"><i class="bi bi-check-lg"></i> Xác nhận trả</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
requireAuth();
document.getElementById('dynamicStyle').textContent = SIDEBAR_CSS;
document.getElementById('sidebarContainer').innerHTML = renderSidebar('borrows');
const borrowModal = new bootstrap.Modal(document.getElementById('borrowModal'));
const returnModal = new bootstrap.Modal(document.getElementById('returnModal'));

async function loadData() {
  showLoading(true);
  const { data } = await apiFetch('/borrows');
  const list = Array.isArray(data) ? data : [];
  if (!list.length) {
    document.getElementById('borrowsTable').innerHTML = `<tr><td colspan="10" class="empty-state"><i class="bi bi-music-note-beamed"></i>Chưa có giao dịch nào</td></tr>`;
  } else {
    document.getElementById('borrowsTable').innerHTML = list.map((b,i) => `
      <tr>
        <td style="color:var(--text-muted)">${i+1}</td>
        <td><strong>${b.instrument_name}</strong><br><small style="color:var(--text-muted)">${b.category||''}</small></td>
        <td>${b.borrower_name}<br><small>${b.borrower_phone||''}</small></td>
        <td>${b.staff_name||'—'}</td>
        <td style="font-size:0.78rem">${formatDate(b.borrow_date)}</td>
        <td style="font-size:0.78rem">${formatDate(b.expected_return)}</td>
        <td style="font-size:0.78rem">${b.actual_return_date ? formatDate(b.actual_return_date) : '—'}</td>
        <td style="font-size:0.8rem">
          <span style="color:var(--primary)">${formatCurrency(b.borrow_price)}</span>
          ${b.damage_fee>0 ? `<br><span style="color:#dc3545;font-size:0.75rem">+${formatCurrency(b.damage_fee)} hỏng</span>` : ''}
          ${b.late_fee>0 ? `<br><span style="color:#ffc107;font-size:0.75rem">+${formatCurrency(b.late_fee)} trễ</span>` : ''}
        </td>
        <td style="font-size:0.78rem">${b.condition_before||'—'} → ${b.condition_after||'?'}</td>
        <td>${badgeStatus(b.status)}</td>
      </tr>`).join('');
  }
  showLoading(false);
}

async function openBorrowModal() {
  const { data } = await apiFetch('/instruments');
  const avail = Array.isArray(data) ? data.filter(i => i.status === 'available') : [];
  document.getElementById('bInstrument').innerHTML = avail.map(i => `<option value="${i.id}">${i.name} — ${formatCurrency(i.rental_price)}/giờ</option>`).join('');
  ['bUserId','bDeposit','bCondNotes','bNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('bExpected').value = '';
  borrowModal.show();
}

async function openReturnModal() {
  const { data } = await apiFetch('/borrows');
  const active = Array.isArray(data) ? data.filter(b => b.status === 'borrowed') : [];
  document.getElementById('rBorrowId').innerHTML = active.map(b => `<option value="${b.borrow_id}">${b.instrument_name} — ${b.borrower_name}</option>`).join('');
  document.getElementById('rDamageFee').value = '0';
  document.getElementById('rNotes').value = '';
  returnModal.show();
}

async function saveBorrow() {
  const body = {
    instrument_id: document.getElementById('bInstrument').value,
    user_id: document.getElementById('bUserId').value,
    expected_return: document.getElementById('bExpected').value,
    deposit: document.getElementById('bDeposit').value || 0,
    condition_rating: document.getElementById('bCondition').value,
    condition_notes: document.getElementById('bCondNotes').value,
    notes: document.getElementById('bNotes').value,
  };
  if (!body.instrument_id || !body.user_id || !body.expected_return) return showToast('Vui lòng điền đầy đủ!', 'error');
  const { ok, data } = await apiFetch('/borrows/borrow', { method:'POST', body: JSON.stringify(body) });
  if (ok) { showToast(`✅ Cho mượn thành công!`); borrowModal.hide(); loadData(); }
  else showToast(data.message || 'Lỗi!', 'error');
}

async function saveReturn() {
  const body = {
    borrow_id: document.getElementById('rBorrowId').value,
    condition_rating: document.getElementById('rCondition').value,
    damage_fee: document.getElementById('rDamageFee').value || 0,
    notes: document.getElementById('rNotes').value,
  };
  if (!body.borrow_id) return showToast('Vui lòng chọn giao dịch!', 'error');
  const { ok, data } = await apiFetch('/borrows/return', { method:'POST', body: JSON.stringify(body) });
  if (ok) {
    showToast(`✅ Nhận trả thành công! Phí trễ: ${formatCurrency(data.late_fee)} | Hoàn cọc: ${formatCurrency(data.refund)}`);
    returnModal.hide(); loadData();
  } else showToast(data.message || 'Lỗi!', 'error');
}

loadData();
</script>
</body>
</html>
