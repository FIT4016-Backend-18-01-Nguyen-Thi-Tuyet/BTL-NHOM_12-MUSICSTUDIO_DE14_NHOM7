<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người dùng — Music Studio Manager</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <script src="shared.js"></script>

    <style id="dynamicStyle"></style>

</head>

<body>

    <div id="sidebarContainer"></div>

    <div class="main-content">

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner-ring"></div>
        </div>

        <div class="page-header">
            <div class="page-title">👥 Quản lý Người dùng</div>
        </div>

        <div class="data-table">

            <div class="table-header">

                <div style="display:flex;justify-content:space-between;align-items:center;width:100%">

                    <div class="table-title">Danh sách người dùng</div>

                    <div style="display:flex;gap:10px">

                        <button class="btn btn-success" onclick="addUserTest()">
                            <i class="bi bi-plus"></i> Thêm User Test
                        </button>

                        <input type="text"
                               class="form-control"
                               id="searchInput"
                               placeholder="🔍 Tìm kiếm..."
                               style="max-width:200px"
                               oninput="filterTable()">

                    </div>

                </div>

            </div>

            <div style="overflow-x:auto">

                <table>

                    <thead>

                        <tr>

                            <th>#</th>
                            <th>Họ tên</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>

                        </tr>

                    </thead>

                    <tbody id="usersTable">

                        <tr>
                            <td colspan="8" class="empty-state">
                                <i class="bi bi-hourglass"></i>
                                Đang tải...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

requireAuth();

document.getElementById('dynamicStyle').textContent = SIDEBAR_CSS;

document.getElementById('sidebarContainer').innerHTML = renderSidebar('users');

let allData = [];

async function loadData() {

showLoading(true);

const { data } = await apiFetch('/users');

allData = Array.isArray(data) ? data : [];

renderTable(allData);

showLoading(false);

}

function renderTable(data) {

if (!data.length) {

document.getElementById('usersTable').innerHTML =
`<tr>
<td colspan="8" class="empty-state">
<i class="bi bi-people"></i>
Không có người dùng
</td>
</tr>`;

return;

}

document.getElementById('usersTable').innerHTML = data.map((u,i)=>`

<tr>

<td style="color:var(--text-muted)">${i+1}</td>

<td>
<div style="display:flex;align-items:center;gap:0.5rem">
<div style="width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem">
${u.full_name[0].toUpperCase()}
</div>
${u.full_name}
</div>
</td>

<td style="color:var(--text-muted)">
${u.username}
</td>

<td>${u.email}</td>

<td>${u.phone||'—'}</td>

<td>
<span class="badge-status ${u.role==='admin'?'badge-cancelled':u.role==='staff'?'badge-confirmed':'badge-available'}">
${u.role.toUpperCase()}
</span>
</td>

<td>
<span class="badge-status ${u.is_active?'badge-available':'badge-cancelled'}">
${u.is_active?'Hoạt động':'Bị khóa'}
</span>
</td>

<td>

<button class="btn-sm-action"
onclick="toggleUser(${u.id})"
title="${u.is_active?'Khóa':'Mở khóa'}">

<i class="bi bi-${u.is_active?'lock':'unlock'}"></i>

</button>

<button class="btn-sm-action danger"
onclick="deleteUser(${u.id})"
title="Xóa">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

`).join('');

}

function filterTable() {

const s = document.getElementById('searchInput').value.toLowerCase();

renderTable(allData.filter(u=>
u.full_name.toLowerCase().includes(s) ||
u.username.toLowerCase().includes(s) ||
u.email.toLowerCase().includes(s)
));

}

async function toggleUser(id) {

const { ok } = await apiFetch(`/users/${id}/toggle`, { method:'PATCH' });

if (ok) {

showToast('Cập nhật trạng thái thành công!');

loadData();

}

}

async function deleteUser(id) {

if (!confirm('Xóa người dùng này?')) return;

const { ok } = await apiFetch(`/users/${id}`, { method:'DELETE' });

if (ok) {

showToast('Xóa thành công!');

loadData();

}

}

async function addUserTest(){

const newUser = {

full_name:"Test User",

username:"test"+Math.floor(Math.random()*1000),

email:"test@gmail.com",

phone:"0999999999",

role:"staff"

};

const { ok } = await apiFetch('/users',{

method:'POST',

body:JSON.stringify(newUser)

});

if(ok){

showToast("Thêm user thành công!");

loadData();

}

}

loadData();

    </script>

</body>
</html>
